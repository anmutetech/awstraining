<!DOCTYPE html>
<html>
<head>
  <title>Fintech Loan Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 8px rgba(102,126,234,0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: linear-gradient(90deg, #ff512f, #dd2476);
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      font-size: 16px;
      display: none;
    }

  </style>
</head>
<body>

  <div class="card">
    <h1>💰 Loan Calculator</h1>

    <form id="loanForm">
      <input type="number" id="amount" placeholder="Loan Amount (₦)" required />
      <input type="number" id="rate" placeholder="Interest Rate (%)" required />
      <input type="number" id="years" placeholder="Years" required />
      <button type="submit">Calculate</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById("loanForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const amount = document.getElementById("amount").value;
      const rate = document.getElementById("rate").value;
      const years = document.getElementById("years").value;

      const response = await fetch("/calculate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, rate, years })
      });

      const data = await response.json();

      const resultBox = document.getElementById("result");
      resultBox.style.display = "block";
      resultBox.innerHTML = `
        Monthly Payment: ₦${data.monthlyPayment}
      `;
    });
  </script>

</body>
</html>
